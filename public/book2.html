	/* ── Tokens ──────────────────────────────────────────────── */
	:root {
	  --red:       #8b0000;
	  --red-hover: #720000;
	  --off-white: #f8f8f6;
	  --border:    #ddd;
	  --muted:     #777;
	}



	/* ─────────────────────────────────────────────────────────
	   CART SUMMARY BAR
	   Full-width off-white section — clearly separated from accordion
	───────────────────────────────────────────────────────── */
	#bk-cart-summary {
	  display: none;           /* shown via JS when cart has items */
	  padding: 1.4rem 2rem;
	}
	.bk-cart-bar {
	  max-width: 660px;
	  margin: 0 auto;
	  display: flex;
	  align-items: center;
	  justify-content: space-between;
	  gap: 1rem;
	  flex-wrap: wrap;
	  /* Desktop: contained off-white box */
	  background: var(--off-white);
	  border: 1px solid var(--border);
	  padding: 1rem 1.4rem;
	}
	.bk-cart-bar-left {
	  display: flex;
	  align-items: center;
	  gap: 0.65rem;
	  font-size: 1.2rem;
	  color: #222;
	}
	.bk-cart-bar-count {
	  background: var(--red);
	  color: #fff;
	  -webkit-text-fill-color: #fff;
	  font-size: 1rem;
	  font-weight: 700;
	  min-width: 28px;
	  height: 28px;
	  padding: 0 6px;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  flex-shrink: 0;
	}
	.bk-cart-bar-btn {
	  background: var(--red);
	  color: #fff;
	  -webkit-text-fill-color: #fff;
	  border: none;
	  font-family: 'Lora', serif;
	  font-size: 0.9rem;
	  font-weight: 600;
	  letter-spacing: 1px;
	  text-transform: uppercase;
	  padding: 0.85rem 1.8rem;
	  cursor: pointer;
	  transition: background 0.15s;
	  white-space: nowrap;
	}
	.bk-cart-bar-btn:hover { background: var(--red-hover); }

	/* ── Consistent column width across all desktop sections ── */
	@media (min-width: 721px) {
	  /* Booking form inner box — scoped to main page only, not cart */
	  .page-wrapper .booking-form .form-section { max-width: 900px !important; }

	  /* Accordion — override accordion.css's 10% padding approach */
	  .accordion { max-width: 900px !important; margin: 0 auto !important; padding-left: 0 !important; padding-right: 0 !important; }

	  /* Cart summary bar */
	  .bk-cart-bar { max-width: 900px; }

	  /* Other Ways to Book */
	  #otherWaysSection { max-width: 900px; margin-left: auto; margin-right: auto; }
	}

	@media (max-width: 720px) {
	  #bk-cart-summary {
	    background: var(--off-white);
	    border-top: 1px solid var(--border);
	    border-bottom: 1px solid var(--border);
	    padding: 1.2rem 1.4rem;
	  }
	  .bk-cart-bar {
	    background: none;
	    border: none;
	    padding: 0;
	    flex-direction: column;
	    align-items: flex-start;
	  }
	  .bk-cart-bar-btn { width: 100%; text-align: center; }
	}

<script>
function updateCartUI() {
  const cart = (typeof getCart === 'function') ? getCart() : [];
  const qty  = cart.reduce((s, i) => s + i.qty, 0);

  const invVisible = document.getElementById('inventorySection').style.display !== 'none';
  const bar = document.getElementById('bk-cart-summary');
  if (bar) {
    bar.style.display = (qty > 0 && invVisible) ? 'block' : 'none';
    const countEl = document.getElementById('bkCartCount');
    const labelEl = document.getElementById('bkCartLabel');
    if (countEl) countEl.textContent = qty;
    if (labelEl) labelEl.textContent = qty === 1 ? 'item in cart' : 'items in cart';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const _orig = window.renderCart;
  if (typeof _orig === 'function') {
    window.renderCart = function() {
      _orig();
      updateCartUI();
    };
  }
  updateCartUI();

  const inv = document.getElementById('inventorySection');
  if (inv) {
    new MutationObserver(updateCartUI).observe(inv, { attributes: true, attributeFilter: ['style'] });
  }
});
</script>
