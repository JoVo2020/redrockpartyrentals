	<style>

	/* ── Tokens ─────────────────────────────────────────────── */
	:root {
	  --red:       #8b0000;
	  --red-hover: #720000;
	  --off-white: #f8f8f6;
	  --border:    #ddd;
	  --muted:     #777;

		gap: 18px;

	/* ── Cart booking info panel ─────────────────────────────── */
	.cart-info-row {
	  display: flex;
	  align-items: flex-start;
	  justify-content: space-between;
	  gap: 0.5rem;
	  padding: 3px 0;
	}
	.cart-info-label {
	  font-size: 0.62rem;
	  font-weight: 700;
	  text-transform: uppercase;
	  letter-spacing: 1.5px;
	  color: #888;
	  margin-bottom: 3px;
	}
	.cart-info-value {
	  font-size: 0.88rem;
	  color: #222;
	  line-height: 1.45;
	}
	.cart-info-sep {
	  border-top: 1px solid #d5d5d5;
	  margin: 10px 0;
	}
	.cart-info-edit {
	  background: none;
	  border: none;
	  font-family: 'Lora', serif;
	  font-size: 0.78rem;
	  color: var(--red);
	  text-decoration: underline;
	  cursor: pointer;
	  flex-shrink: 0;
	  padding: 0;
	  margin-top: 1px;
	}
	.cart-info-edit:hover { color: var(--red-hover); }

	/* ── Click-to-edit affordance ───────────────────────────────── */
	.cart-info-row > div { cursor: pointer; }

	/* ── Cart scroll area ────────────────────────────────────── */
	.cart-scroll-area {
	  flex: 1;
	  overflow-y: auto;
	  -webkit-overflow-scrolling: touch;
	}
	.cart-scroll-area .cart-items {
	  flex: none;
	  overflow-y: visible;
	}

	/* ── Schedule groups ─────────────────────────────────────── */
	.schedule-group { margin-bottom: 1.5rem; }

	.schedule-group-title {
	  font-size: 0.7rem;
	  font-weight: 700;
	  text-transform: uppercase;
	  letter-spacing: 1.5px;
	  color: var(--muted);
	  margin-bottom: 0.6rem;
	}

	/* ── Time option cards ───────────────────────────────────── */
	.time-option-grid {
	  display: grid;
	  grid-template-columns: 1fr 1fr;
	  gap: 0.75rem;
	}

	.time-option-card {
	  border: 2px solid var(--border);
	  padding: 5px 10px;
	  cursor: pointer;
	  display: block;
	  transition: border-color 0.15s, background 0.15s;
	  user-select: none;
	}
	.time-option-card input[type="radio"] { display: none; }
	.time-option-card:has(input:checked)  { border-color: var(--red); background: #fdf5f5; }

	.time-option-card__day {
	  font-size: 0.67rem;
	  text-transform: uppercase;
	  letter-spacing: 0.9px;
	  color: #bbb;
	  margin-bottom: 0.15rem;
	}
	.time-option-card__date {
	  font-size: 1.05rem;
	  font-weight: 600;
	  color: #bbb;
	  margin-bottom: 0.25rem;
	}
	.time-option-card__window { font-size: 0.85rem; color: #bbb; }

	.time-option-card:has(input:checked) .time-option-card__day   { color: var(--muted); }
	.time-option-card:has(input:checked) .time-option-card__date  { color: #222; }
	.time-option-card:has(input:checked) .time-option-card__window { color: #444; }

	@media (max-width: 480px) {
	  .time-option-grid { grid-template-columns: 1fr; }
	}

	<script>
	/* -------------------------
	   Get Category from URL
	------------------------- */
	const parts = window.location.pathname.split("/").filter(Boolean);
	const categorySlug = parts[1]; // /rentals/games

	function formatCategory(slug) {
	  return slug
		.replace(/-/g, " ")
		.replace(/\b\w/g, c => c.toUpperCase());
	}

	/* -------------------------
	   Map Slug → Product Category
	------------------------- */
	function mapCategory(slug) {
	  const map = {
		"games": "Games",
		"marquee-letters": "Marquee Letters",
		"tables-chairs": "Tables And Chairs",
		"table-covers": "Table Covers",
		"table-runners": "Table Runners",
		"party-essentials": "Other"
	  };

	  return map[slug] || slug;
	}

	const categoryName = mapCategory(categorySlug);

	/* -------------------------
	   Set Header
	------------------------- */
	
	let categoryTitle = formatCategory(categorySlug);
	if (categoryTitle == 'Tables Chairs'){
		categoryTitle = 'Tables & Chairs';
	}
	
	document.getElementById("categoryTitle").textContent = categoryTitle;

	/* -------------------------
	   Render Products
	------------------------- */
	const grid = document.getElementById("categoryGrid");

	const money = (v) => "$" + Number(v).toFixed(0);

	window.PRODUCT_DATA
	  .filter(p => p["Category"] === categoryName)
	  .forEach(item => {

		const card = document.createElement("div");
		card.className = "rr-card";

		card.innerHTML = `
		  <a href="/product?id=${item.Product_ID}">
			<img class="rr-card__img" src="${item.Image}" />
		  </a>
		  <div class="rr-card__body">
			<div class="rr-card__name">
			  ${item["Item Name"]} - ${money(item["Rental Price"])}
			</div>
			<button class="rr-btn-addToCart">Add To Cart</button>
		  </div>
		`;

		card.querySelector("button").onclick = () => {
		  addToCart({
			id: item.Product_ID,
			product_id: item.Product_ID,
			name: item["Item Name"],
			price: item["Rental Price"],
			image: item.Image,
			availableQty: item["Quantity Available"]
		  });
		};

		grid.appendChild(card);
	  });

	function renderCategoryBreadcrumb(categoryName) {

	  const breadcrumb = document.getElementById("breadcrumb");
	  if (!breadcrumb) return;


	  breadcrumb.innerHTML = `
		<a href="/">Home</a>
		<span class="breadcrumb-sep">›</span>
		<a href="/rentals">Rentals</a>
		<span class="breadcrumb-sep">›</span>
		<span>${categoryName}</span>
	  `;
	}
	
	document.addEventListener("DOMContentLoaded", () => {
		renderCategoryBreadcrumb(categoryName);
	});

	</script>

<script>
// ─── Cart booking info ────────────────────────────────────────────────────────

function preselectOption(radioName, isoDate, window) {
  const target = new Date(isoDate).toDateString();
  document.querySelectorAll(`input[name="${radioName}"]`).forEach(radio => {
    const val = JSON.parse(radio.value);
    if (new Date(val.date).toDateString() === target && val.window === window) {
      radio.checked = true;
    }
  });
}

function buildOptionCard(radioName, opt) {
  const dayStr  = opt.date.toLocaleDateString('en-US', { weekday: 'long' });
  const dateStr = opt.date.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  const value   = JSON.stringify({ date: opt.date.toISOString(), window: opt.window });
  return `
    <label class="time-option-card">
      <input type="radio" name="${radioName}" value='${value}' ${opt.isDefault ? 'checked' : ''}>
      <div class="time-option-card__day">${dayStr}</div>
      <div class="time-option-card__date">${dateStr}</div>
      <div class="time-option-card__window">${opt.window}</div>
    </label>`;
}

function renderCartDropoffOptions(eventDate) {
  const dayBefore = new Date(eventDate); dayBefore.setDate(eventDate.getDate() - 1);
  const dayBeforeIsWeekend = dayBefore.getDay() === 0 || dayBefore.getDay() === 6;

  let options;
  if (eventDate.getDay() === 6) {
    options = [
      { date: new Date(eventDate), window: '8:00 AM – 11:00 AM', isDefault: true },
      { date: new Date(dayBefore), window: '5:00 PM – 8:00 PM',  isDefault: false }
    ];
  } else if (dayBeforeIsWeekend) {
    options = [
      { date: new Date(dayBefore), window: '5:00 PM – 8:00 PM',  isDefault: true },
      { date: new Date(dayBefore), window: '8:00 AM – 11:00 AM', isDefault: false }
    ];
  } else {
    const twoBefore = new Date(eventDate); twoBefore.setDate(eventDate.getDate() - 2);
    options = [
      { date: new Date(dayBefore), window: '5:00 PM – 8:00 PM', isDefault: true },
      { date: twoBefore,           window: '5:00 PM – 8:00 PM', isDefault: false }
    ];
  }

  document.getElementById('cartDropoffOptions').innerHTML =
    [...options].reverse().map(o => buildOptionCard('cartDropoff', o)).join('');
}

function renderCartPickupOptions(eventDate) {
  const dayAfter = new Date(eventDate); dayAfter.setDate(eventDate.getDate() + 1);
  const dayAfterIsWeekend = dayAfter.getDay() === 0 || dayAfter.getDay() === 6;

  let options;
  if (eventDate.getDay() === 6) {
    options = [
      { date: new Date(dayAfter), window: '8:00 AM – 11:00 AM', isDefault: true },
      { date: new Date(dayAfter), window: '5:00 PM – 8:00 PM',  isDefault: false }
    ];
  } else if (dayAfterIsWeekend) {
    options = [
      { date: new Date(dayAfter), window: '8:00 AM – 11:00 AM', isDefault: false },
      { date: new Date(dayAfter), window: '5:00 PM – 8:00 PM',  isDefault: true  }
    ];
  } else {
    const twoDaysAfter = new Date(eventDate); twoDaysAfter.setDate(eventDate.getDate() + 2);
    options = [
      { date: new Date(dayAfter), window: '5:00 PM – 8:00 PM', isDefault: true },
      { date: twoDaysAfter,       window: '5:00 PM – 8:00 PM', isDefault: false }
    ];
  }

  document.getElementById('cartPickupOptions').innerHTML =
    options.map(o => buildOptionCard('cartPickup', o)).join('');
}

function refreshCartBookingInfo() {
  const storedDate = JSON.parse(localStorage.getItem('rrpr_event_date'));
  const dateEl = document.getElementById('cartDateValue');
  if (dateEl) {
    if (storedDate) {
      const [y, m, d] = storedDate.split('-');
      const eventDate = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
      dateEl.textContent = eventDate.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });
    } else {
      dateEl.textContent = 'Not selected';
    }
  }

  const timesEl = document.getElementById('cartTimesValue');
  if (timesEl) {
    const dropoff = localStorage.getItem('rrpr_dropoff_manual') || localStorage.getItem('rrpr_dropoff');
    const pickup  = localStorage.getItem('rrpr_pickup_manual')  || localStorage.getItem('rrpr_pickup');
    if (dropoff && pickup) {
      const dd  = JSON.parse(dropoff);
      const pd  = JSON.parse(pickup);
      const fmt = iso => new Date(iso).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      timesEl.innerHTML =
        `Dropoff: ${fmt(dd.dropoffDate)}, ${dd.dropoffWindow}<br>` +
        `Pickup: ${fmt(pd.pickupDate)}, ${pd.pickupWindow}`;
    } else {
      timesEl.textContent = 'Not selected';
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  refreshCartBookingInfo();

  // ── Click label/value area to trigger edit ───────────────────────────────
  document.querySelector('#cartDateRow > div').addEventListener('click', () => {
    document.getElementById('cartEditDateBtn').click();
  });
  document.querySelector('#cartTimesRow > div').addEventListener('click', () => {
    document.getElementById('cartEditTimesBtn').click();
  });

  // Hook into dateStart2's flatpickr onChange (after book-now-component.js sets it up)
  const fp2 = document.getElementById('dateStart2')._flatpickr;
  if (fp2) {
    fp2.config.onChange.push((selectedDates, dateStr) => {
      if (!dateStr) return;
      const [month, day, year] = dateStr.split('/');
      const iso = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
      localStorage.setItem('rrpr_event_date', JSON.stringify(iso));
      // Clear delivery times — they may not apply to the new date
      localStorage.removeItem('rrpr_dropoff_manual');
      localStorage.removeItem('rrpr_pickup_manual');
      localStorage.removeItem('rrpr_dropoff');
      localStorage.removeItem('rrpr_pickup');
      localStorage.removeItem('rrpr_availability_state');
      // Collapse the date edit form and refresh cart display
      document.getElementById('cartDateEdit').style.display = 'none';
      document.getElementById('cartDateRow').style.display  = 'flex';
      document.getElementById('CheckingAvailabilityNote').style.display = 'none';
      refreshCartBookingInfo();
      // Auto-open time options
      document.getElementById('cartEditTimesBtn').click();
    });
  }

  // Edit date button
  document.getElementById('cartEditDateBtn').addEventListener('click', () => {
    const fp2 = document.getElementById('dateStart2')?._flatpickr;
    if (fp2) {
      const storedDate = JSON.parse(localStorage.getItem('rrpr_event_date'));
      if (storedDate) {
        const [y, m, d] = storedDate.split('-');
        const localDate = new Date(+y, +m - 1, +d);
        fp2.setDate(localDate, false);
        fp2.jumpToDate(localDate);
      }
    }
    document.getElementById('cartDateRow').style.display  = 'none';
    document.getElementById('cartDateEdit').style.display = 'block';
  });

  // Edit times button
  document.getElementById('cartEditTimesBtn').addEventListener('click', () => {
    const storedDate = JSON.parse(localStorage.getItem('rrpr_event_date'));
    if (!storedDate) { alert('Please select an event date first.'); return; }
    const [y, m, d] = storedDate.split('-');
    const eventDate = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));

    // Read before clearing so we can restore the selection
    const prevDropoff = localStorage.getItem('rrpr_dropoff_manual') || localStorage.getItem('rrpr_dropoff');
    const prevPickup  = localStorage.getItem('rrpr_pickup_manual')  || localStorage.getItem('rrpr_pickup');

    renderCartDropoffOptions(eventDate);
    renderCartPickupOptions(eventDate);

    // Restore previously selected options
    if (prevDropoff) { const dd = JSON.parse(prevDropoff); preselectOption('cartDropoff', dd.dropoffDate, dd.dropoffWindow); }
    if (prevPickup)  { const pd = JSON.parse(prevPickup);  preselectOption('cartPickup',  pd.pickupDate,  pd.pickupWindow);  }

    document.getElementById('cartTimesRow').style.display  = 'none';
    document.getElementById('cartTimesEdit').style.display = 'block';
  });

  // Confirm times button
  document.getElementById('cartConfirmTimesBtn').addEventListener('click', () => {
    const dropoffInput = document.querySelector('#cartDropoffOptions input[name="cartDropoff"]:checked');
    const pickupInput  = document.querySelector('#cartPickupOptions input[name="cartPickup"]:checked');
    if (!dropoffInput) { alert('Please select a dropoff time.'); return; }
    if (!pickupInput)  { alert('Please select a pickup time.');  return; }

    const dd = JSON.parse(dropoffInput.value);
    const pd = JSON.parse(pickupInput.value);
    const dropoffPayload = { dropoffDate: dd.date, dropoffWindow: dd.window };
    const pickupPayload  = { pickupDate:  pd.date, pickupWindow:  pd.window  };

    localStorage.setItem('rrpr_dropoff_manual', JSON.stringify(dropoffPayload));
    localStorage.setItem('rrpr_pickup_manual',  JSON.stringify(pickupPayload));
    localStorage.setItem('rrpr_dropoff', JSON.stringify(dropoffPayload));
    localStorage.setItem('rrpr_pickup',  JSON.stringify(pickupPayload));

    document.getElementById('cartTimesEdit').style.display = 'none';
    document.getElementById('cartTimesRow').style.display  = 'flex';
    refreshCartBookingInfo();

    // ── Check availability using actual dropoff → pickup window ──────────
    const storedDate = JSON.parse(localStorage.getItem('rrpr_event_date'));
    if (storedDate) {
      const toLocalISO = isoStr => {
        const d = new Date(isoStr);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      };
      AvailabilityService.setRentalDates(storedDate);
      AvailabilityService.setRentalDateRange(
        toLocalISO(dropoffPayload.dropoffDate),
        toLocalISO(pickupPayload.pickupDate)
      );
      renderCart();
      AvailabilityService.ensureAvailability()
        .then(() => {
          if (typeof refreshCartAvailability === 'function') refreshCartAvailability();
          renderCart();
        })
        .catch(() => renderCart());
    }
  });
});
</script>
