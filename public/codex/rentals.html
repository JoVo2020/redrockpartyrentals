<script>
document.addEventListener("DOMContentLoaded", () => {

  const money = (v) => "$" + Number(v).toFixed(0);

  // Get all category containers
  const grids = document.querySelectorAll(".inventory-grid");

  grids.forEach(grid => {
    const categoryName = grid.getAttribute("data-category");

    // Filter products by category
    const items = window.PRODUCT_DATA.filter(p => p["Category"] === categoryName);

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "item inventory-item";

      card.innerHTML = `
        <a href="product?id=${item.Product_ID}">
          <img src="${item.Image}" alt="${item["Item Name"]}" />
          <p>${item["Item Name"]} - ${money(item["Rental Price"])}</p>
        </a>
        <button class="rr-btn-addToCart">Add To Cart</button>
      `;

      // Add to cart logic
      card.querySelector("button").onclick = () => {
        addToCart({
          id: item.Product_ID,
          product_id: item.Product_ID,
          name: item["Item Name"],
          price: item["Rental Price"],
          image: item.Image,
          availableQty: item["Quantity Available"]
        });
      };

      grid.appendChild(card);
    });

  });

});



function handleBookNowBtn() {

  const cart = getCart();

  if (!cart || cart.length === 0) {
    // Cart empty → go to booking page
    window.location.href = "/book";
  } else {
    // Cart has items → open cart
    openCart();
    renderCart();
  }

}

document.addEventListener("DOMContentLoaded", () => {

  const rentalDates = AvailabilityService.getRentalDates();

  if (!rentalDates) return;

  const urlDate = rentalDates.start;
  const [year, month, day] = urlDate.split("-");
  const formatted = `${month}/${day}/${year}`;

  const cartInput = document.getElementById("dateStart2");
  if (cartInput) {
    cartInput.value = formatted;
  }

  const mobileInputs = document.querySelectorAll(".flatpickr-mobile");
  mobileInputs.forEach(input => {
    input.value = urlDate;
  });

});
</script>
