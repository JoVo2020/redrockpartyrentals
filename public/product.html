	<div class="product-wrapper">

	  </div>

	  <div>
		<div class="product-title" id="productName"></div>
		<div class="product-price" id="productPrice"></div>

		  <div id="productDescription"></div>
		</div>	
		
		<div id="availabilityBadge" class="availability-badge badge-neutral" style="display:none;"></div>

				id="qtyInput"
				type="number"
				min="1"
				step="1"

	<!-- CART OVERLAY -->

		  <h2 style="margin-bottom:0;font-size:30px;">Cart</h2>
		  <button class="cart-close" onclick="closeCart()">✕</button>
		</header>


		<div class="cart-scroll-area">

		    <div class="cart-info-row" id="cartDateRow">
		      <div>
		        <div class="cart-info-label">Event Date</div>
		        <div class="cart-info-value" id="cartDateValue">Not selected</div>
		      </div>
		      <button class="cart-info-edit" id="cartEditDateBtn">Edit</button>
		    </div>

		    <div id="cartDateEdit" style="display:none; padding-top:8px;">

<script src="dropoff_pickup_rules.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
  
document.addEventListener('DOMContentLoaded', async () => {


  // ----------------------------
  // STATIC PRODUCT DATA
  // ----------------------------
	const item = window.PRODUCT_DATA.find(
	  p => p.Product_ID === productId
	);
	
  if (!item) {
    document.body.innerHTML = "<h2>Product not found</h2>";
    return;
  }

  // ----------------------------
  // RENDER STATIC DATA INSTANTLY
  // ----------------------------
  // Render instantly (no API calls)
  document.getElementById('productName').textContent =
    item["Item Name"];

  document.getElementById('productPrice').textContent =
    "$" + item["Rental Price"].toFixed(2) + " each";

  document.getElementById('productImage').src =
    item["Image"];

  document.getElementById('productDescription').textContent =
    item["Item Description"];

  renderBreadcrumb(item);

  const badge = document.getElementById('availabilityBadge');
  const addBtn = document.getElementById('addBtn');
  const qtyInput = document.getElementById('qtyInput');

  // ----------------------------
  // CHECK IF DATE EXISTS
  // ----------------------------
  const dates = AvailabilityService.getRentalDates();

  if (!dates) {

    updateBadge();

  } else {

    // ONLY NOW call availability
    try {

      const availability =
        await AvailabilityService.ensureAvailability();

      const liveItem =
        availability ? availability[item.id] : null;

      if (liveItem) {

        updateBadge();

        qtyInput.max =
          liveItem.availableQty;

      } else {

        updateBadge();

      }

    } catch (err) {

      updateBadge();

    }
  }

  // ----------------------------
  // ADD TO CART (ALWAYS ALLOWED)
  // ----------------------------
	addBtn.addEventListener('click', async () => {

	  let maxAvailable = 999;

	  const dates = AvailabilityService.getRentalDates();

	  if (dates) {
		try {
		  const availability = await AvailabilityService.ensureAvailability();
		  const liveItem = availability?.[productId];

		  if (liveItem && typeof liveItem.availableQty === "number") {
			maxAvailable = liveItem.availableQty;
		  }
		} catch (err) {
		  console.warn("Availability check failed, defaulting to 999");
		}
	  }

	  const requestedQty = parseInt(qtyInput.value) || 1;
	  const finalQty = Math.min(requestedQty, maxAvailable);

	  addToCart({
		id: item["Product_ID"],
		name: item["Item Name"],
		price: item["Rental Price"],
		image: item["Image"],
		availableQty: maxAvailable,
		qty: finalQty
	  });

	});

});

const qtyInput = document.getElementById("qtyInput");
const minusBtn = document.getElementById("qtyMinus");
const plusBtn = document.getElementById("qtyPlus");

minusBtn.addEventListener("click", () => {
  let current = parseInt(qtyInput.value) || 1;
  if (current > 1) {
    qtyInput.value = current - 1;
	updateBadge();
  }
});

plusBtn.addEventListener("click", () => {
  let current = parseInt(qtyInput.value) || 1;
  qtyInput.value = current + 1;
  updateBadge();
});

qtyInput.addEventListener("input", updateBadge);



function updateBadge() {

  const badge = document.getElementById("availabilityBadge");
  const qtyInput = document.getElementById("qtyInput");

  if (!badge || !qtyInput) return;

  const dates = AvailabilityService.getRentalDates();

  // No date selected
  if (!dates) {
    badge.style.display = "none";
    return;
  }

  const liveItem =
    AvailabilityService.getProductAvailability(productId);

  if (!liveItem) {
    return; // availability not fetched yet
  }

  const availableQty = liveItem.availableQty;
  const requestedQty = parseInt(qtyInput.value) || 1;

  badge.style.display = "inline-block";

  if (availableQty === 0) {
    badge.textContent = "Unavailable for selected date";
    badge.className = "availability-badge badge-danger";
    return;
  }

  if (availableQty < requestedQty) {
    badge.textContent =
      `Only ${availableQty} available for selected date`;
    badge.className = "availability-badge badge-warning";
    return;
  }

  badge.textContent = `Available`;
  badge.className = "availability-badge badge-success";
}




function renderBreadcrumb(item) {

  const breadcrumb = document.getElementById("breadcrumb");
  if (!breadcrumb) return;

  const category = item["Category"] || "Rentals";
  const categoryPath = item["CategoryPath"];
  const productName = item["Item Name"];

  breadcrumb.innerHTML = `
    <a href="/">Home</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/rentals">Rentals</a>
    <span class="breadcrumb-sep">›</span>
    <a href="/rentals/${categoryPath}">${category}</a>
    <span class="breadcrumb-sep">›</span>
    <span>${productName}</span>
  `;
}





</script>
